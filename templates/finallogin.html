<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>KAIROS | Entry Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { min-height: 100vh; color: #fff; background: #02030a; overflow: hidden; font-family: sans-serif; }
        #galaxy-bg { position: fixed; inset: 0; z-index: -2; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(0, 210, 255, 0.05), #02030a 90%); z-index: -1; }
        .glass { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 50px rgba(0, 210, 255, 0.15); }
        input { background: rgba(0, 0, 0, 0.5) !important; color: white !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; transition: all 0.3s; }
        input:focus { border-color: #00d2ff !important; box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center">

<canvas id="galaxy-bg"></canvas>
<div class="overlay"></div>

<div class="glass w-96 p-8 rounded-3xl text-center shadow-2xl">
    <h2 id="title" class="text-2xl font-bold mb-2 tracking-tighter italic text-cyan-400 uppercase">KAIROS: Portal</h2>
    <p id="subtitle" class="text-[10px] text-gray-400 mb-6 uppercase tracking-[0.3em]">Accessing Orbital Data</p>

    <div class="space-y-4">
        <input type="text" id="fullname" placeholder="Full Name" class="w-full p-3 rounded-xl outline-none hidden">
        
        <input type="email" id="email" placeholder="Mission Email" class="w-full p-3 rounded-xl outline-none">
        <input type="password" id="password" placeholder="Security Key" class="w-full p-3 rounded-xl outline-none">
    </div>

    <button id="main-btn" class="w-full py-3 mt-6 rounded-xl bg-gradient-to-r from-cyan-600 to-blue-700 font-bold hover:scale-[1.02] active:scale-95 transition-all shadow-lg uppercase text-xs tracking-widest">Login</button>

    <div id="divider" class="flex items-center my-6 opacity-30"><hr class="flex-1"> <span class="px-3 text-[10px] font-bold">OR</span> <hr class="flex-1"></div>

    <button id="google-btn" class="w-full py-3 rounded-xl bg-white text-black font-bold flex items-center justify-center gap-2 hover:bg-gray-200 transition-all text-sm">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Continue with Google
    </button>

    <p class="mt-8 text-xs text-gray-400">
        <span id="toggle-msg">New to the mission?</span> 
        <button onclick="toggleAuth()" class="text-cyan-400 font-bold hover:underline outline-none">Initialize Signup</button>
    </p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCXOKzOkQHGh1yJ8BDrIwibm8HZK8i91vY",
        authDomain: "satfussion.firebaseapp.com",
        projectId: "satfussion",
        storageBucket: "satfussion.firebasestorage.app",
        messagingSenderId: "419400121975",
        appId: "1:419400121975:web:66226e2257cbd8f0acd072"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let isLogin = true;

    // Toggle between Login and Signup
    window.toggleAuth = () => {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "KAIROS: Portal" : "Mission Signup";
        document.getElementById('main-btn').innerText = isLogin ? "Login" : "Create Account";
        document.getElementById('toggle-msg').innerText = isLogin ? "New to the mission?" : "Already a member?";
        document.getElementById('fullname').classList.toggle('hidden');
        document.getElementById('google-btn').classList.toggle('hidden');
        document.getElementById('divider').classList.toggle('hidden');
    };

    // Helper function to save token and redirect
    const finalizeLogin = async (user) => {
        const token = await user.getIdToken();
        localStorage.setItem("token", token);
        localStorage.setItem("userEmail", user.email);
        
        console.log("Mission Credentials Verified. Uplinking...");
        
        // Brief delay to ensure localStorage is written
        setTimeout(() => {
            window.location.href = "/index";
        }, 150);
    };

    // GOOGLE LOGIN
    document.getElementById('google-btn').onclick = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            await finalizeLogin(result.user);
        } catch (err) { alert("Google Auth Failed: " + err.message); }
    };

    // MAIN BUTTON (EMAIL LOGIN / SIGNUP)
    document.getElementById('main-btn').onclick = async () => {
        const name = document.getElementById('fullname').value;
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;

        if(!e || !p) return alert("Please provide Mission Email and Security Key.");

        try {
            let user;
            if(isLogin) {
                // LOGIN LOGIC
                const userCredential = await signInWithEmailAndPassword(auth, e, p);
                user = userCredential.user;
            } else {
                // SIGNUP LOGIC
                if(!name) return alert("Please enter your name for the mission logs.");
                const userCredential = await createUserWithEmailAndPassword(auth, e, p);
                user = userCredential.user;
                await updateProfile(user, { displayName: name });
            }
            
            // Execute the token save and redirect
            await finalizeLogin(user);

        } catch(err) { 
            console.error(err);
            alert("Security Breach: " + err.message); 
        }
    };
</script>

<script>
    // ADVANCED GALAXY ANIMATION
    const canvas = document.getElementById("galaxy-bg");
    const ctx = canvas.getContext("2d");
    let stars = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    class Star {
        constructor() {
            this.x = (Math.random() - 0.5) * canvas.width * 2;
            this.y = (Math.random() - 0.5) * canvas.height * 2;
            this.z = Math.random() * canvas.width;
            this.size = 0.5;
        }
        update() {
            this.z -= 1.5; // Movement speed
            if (this.z <= 0) this.z = canvas.width;
        }
        draw() {
            let sx = (this.x / this.z) * canvas.width/2 + canvas.width/2;
            let sy = (this.y / this.z) * canvas.height/2 + canvas.height/2;
            let r = (1 - this.z / canvas.width) * 2;
            
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(sx, sy, r, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < 800; i++) stars.push(new Star());

    function animate() {
        ctx.fillStyle = "rgba(2, 3, 10, 0.2)"; // Trail effect
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.update();
            s.draw();
        });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
