<!DOCTYPE html>
<html>
<head>
    <title>GEE Connection Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/google/earthengine-api@master/javascript/build/ee_api_js.js"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

    <div class="text-center p-10 bg-gray-800 rounded-3xl border border-cyan-500 shadow-2xl">
        <h1 class="text-2xl font-bold mb-4">GEE Satellite Uplink</h1>
        <p id="status" class="text-yellow-500 mb-6 font-mono">STATUS: AWAITING AUTH</p>
        
        <button id="auth-btn" class="bg-cyan-600 px-8 py-3 rounded-full font-bold hover:bg-cyan-500 transition-all">
            LOGIN TO GOOGLE
        </button>
    </div>

    <script>
        // REPLACE THIS with your Client ID from Google Cloud Console
        const CLIENT_ID = "295622009979-sacivcspkkkqnof19i4qi27jbb7mt2nm.apps.googleusercontent.com";

        document.getElementById('auth-btn').onclick = () => {
            document.getElementById('status').innerText = "STATUS: POPUP OPENED...";
            
            // Step 1: Authenticate
            ee.data.authenticateViaPopup(() => {
                // Step 2: Initialize
                ee.initialize(null, null, () => {
                    document.getElementById('status').innerText = "STATUS: CONNECTED! ✅";
                    document.getElementById('status').classList.replace('text-yellow-500', 'text-green-400');
                    console.log("Success! Your account is now linked to GEE.");
                }, (err) => {
                    document.getElementById('status').innerText = "INIT ERROR: " + err;
                    console.error(err);
                });
            }, (err) => {
                document.getElementById('status').innerText = "AUTH ERROR: " + err;
                console.error(err);
            });
        };
    </script>
</body>
</html>
