<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>KAIROS | NDVI Intelligence Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

    body { 
        background: #02030a; 
        color: white; 
        overflow: hidden; 
        font-family: 'Inter', sans-serif; 
        margin: 0;
    }
    
    #galaxy-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
    
    /* Glassmorphism Effect */
    .glass { 
        background: rgba(13, 17, 23, 0.8); 
        backdrop-filter: blur(15px); 
        border: 1px solid rgba(255,255,255,0.1); 
    }

    #map { 
        height: calc(100vh - 120px); 
        width: 100%; 
        border-radius: 24px; 
        border: 1px solid rgba(0,210,255,0.2); 
        box-shadow: 0 0 40px rgba(0,0,0,0.5); 
    }

    /* Custom Scrollbar */
    #comparison::-webkit-scrollbar { width: 4px; }
    #comparison::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }

    /* Inputs Styling */
    input[type="date"] {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #22d3ee;
        padding: 5px;
        border-radius: 8px;
        font-size: 12px;
        outline: none;
    }

    /* Table Styling */
    table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
    th { text-transform: uppercase; font-size: 10px; letter-spacing: 1px; color: #64748b; padding-bottom: 8px; text-align: left; }
    td { background: rgba(255,255,255,0.03); padding: 12px; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.05); }
    td:first-child { border-radius: 12px 0 0 12px; font-weight: bold; color: #fff; }
    td:last-child { border-radius: 0 12px 12px 0; text-align: right; }

    .leaflet-popup-content-wrapper { background: #0f172a; color: white; border: 1px solid #22d3ee; }
    .leaflet-popup-tip { background: #22d3ee; }
  </style>
</head>
<body>

  <canvas id="galaxy-bg"></canvas>

  <div class="h-screen flex flex-col p-4 relative z-10">
    <header class="flex justify-between items-center mb-4 px-6 py-3 glass rounded-2xl shadow-2xl">
      <div class="flex items-center gap-4">
        <div class="h-10 w-1 bg-cyan-500 rounded-full shadow-[0_0_15px_rgba(6,182,212,0.8)]"></div>
        <div>
          <h1 class="text-xl font-black tracking-tighter text-white italic uppercase">SATFUSION <span class="text-cyan-400">NDVI</span></h1>
          <p class="text-[9px] text-cyan-400/60 font-bold uppercase tracking-widest">Earth Observation Intelligence</p>
        </div>
      </div>
      <div class="hidden md:block text-right">
         <div class="text-[10px] text-gray-500 font-mono">STATUS: UPLINK_STABLE</div>
         <div class="text-[10px] text-cyan-400 font-mono" id="coord-display">REGION: GLOBAL_SCAN</div>
      </div>
    </header>

    <div class="flex flex-col md:flex-row gap-4 flex-1 overflow-hidden">
      <div class="flex-[2] relative">
        <div id="map"></div>
        <div class="absolute bottom-6 left-6 z-[1000] glass px-4 py-2 rounded-xl text-[10px] text-cyan-400 border border-cyan-500/30 font-bold uppercase">
          Tactical Map Display
        </div>
      </div>

      <div id="comparison" class="flex-1 glass rounded-3xl p-6 overflow-y-auto border border-white/5 flex flex-col">
        <div class="controls space-y-4 mb-6 pb-6 border-b border-white/10">
          <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-4 flex items-center gap-2">
            <span class="h-2 w-2 bg-cyan-500 rounded-full animate-pulse"></span> Mission Parameters
          </h3>
          
          <div class="grid grid-cols-1 gap-3">
            <label class="text-[11px] text-gray-400 uppercase font-bold flex justify-between items-center">
                Start Date <input type="date" id="startDate" />
            </label>
            <label class="text-[11px] text-gray-400 uppercase font-bold flex justify-between items-center">
                End Date <input type="date" id="endDate" />
            </label>
          </div>

          <div class="pt-4 space-y-2">
            <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">Sensor Selection</p>
            <label class="flex items-center gap-3 text-sm cursor-pointer hover:text-cyan-400 transition-colors">
                <input type="checkbox" id="sentinel" checked class="accent-cyan-500" /> Sentinel-2
            </label>
            <label class="flex items-center gap-3 text-sm cursor-pointer hover:text-cyan-400 transition-colors">
                <input type="checkbox" id="landsat" class="accent-cyan-500" /> Landsat-8/9
            </label>
            <label class="flex items-center gap-3 text-sm cursor-pointer hover:text-cyan-400 transition-colors">
                <input type="checkbox" id="isro" class="accent-cyan-500" /> ISRO Resourcesat
            </label>
          </div>
        </div>

        <div id="comparison-results">
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Click map to analyze</h3>
            <p class="text-xs text-gray-600 italic">Select an Area of Interest (AOI) on the map to begin cross-satellite NDVI comparison.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- GALAXY ANIMATION ---
    const canvas = document.getElementById("galaxy-bg");
    const ctx = canvas.getContext("2d");
    let stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    for (let i = 0; i < 200; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, z: Math.random()*canvas.width });

    function drawGalaxy() {
      ctx.fillStyle = "#02030a"; ctx.fillRect(0,0,canvas.width,canvas.height);
      stars.forEach(s => {
        s.z -= 0.5; if(s.z <= 0) s.z = canvas.width;
        let sx = (s.x - canvas.width/2) * (canvas.width/s.z) + canvas.width/2;
        let sy = (s.y - canvas.height/2) * (canvas.width/s.z) + canvas.height/2;
        let size = Math.max(0.1, (1 - s.z/canvas.width) * 2.5);
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(sx, sy, size, 0, Math.PI*2); ctx.fill();
      });
      requestAnimationFrame(drawGalaxy);
    }
    drawGalaxy();

    // --- MAP LOGIC ---
    const map = L.map('map', {
      center: [20, 0],
      zoom: 2,
      minZoom: 2,
      maxZoom: 6,
      maxBounds: [[-85, -180], [85, 180]],
      maxBoundsViscosity: 1.0,
      zoomControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    function getColor(value) {
      if (value === null || value === undefined || isNaN(value)) return "#64748b";
      if (value >= 0.6) return "#4ade80"; // Bright Green
      if (value >= 0.3) return "#fbbf24"; // Amber
      return "#f87171"; // Red
    }

    function getNDVILabel(value) {
      if (value === null || value === undefined || isNaN(value)) return "NO DATA";
      if (value >= 0.6) return `${value} (HIGH)`;
      if (value >= 0.3) return `${value} (MID)`;
      return `${value} (LOW)`;
    }

    map.on('click', async function(e) {
      const lat = e.latlng.lat.toFixed(4);
      const lon = e.latlng.lng.toFixed(4);
      document.getElementById('coord-display').innerText = `LOCK: ${lat}, ${lon}`;

      L.marker([lat, lon]).addTo(map)
        .bindPopup(`<b style="color:#000">AOI REGISTERED</b><br><small>${lat}, ${lon}</small>`)
        .openPopup();

      const geoResponse = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
      const geoData = await geoResponse.json();
      const placeName = geoData.display_name.split(',')[0] || "Unknown Site";

      // Visual Loading State
      document.getElementById("comparison-results").innerHTML = `<div class="text-cyan-500 animate-pulse font-mono text-xs">UPLINKING DATA...</div>`;

      const start_date = document.getElementById("startDate").value || new Date().toISOString().split("T")[0];
      const end_date = document.getElementById("endDate").value || new Date().toISOString().split("T")[0];
      const satellites = [];
      if (document.getElementById("sentinel").checked) satellites.push("Sentinel-2");
      if (document.getElementById("landsat").checked) satellites.push("Landsat-8/9");
      if (document.getElementById("isro").checked) satellites.push("ISRO Resourcesat");

      try {
        const response = await fetch("http://127.0.0.1:5000/ndvi_compare", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ lat, lon, start_date, end_date, satellites })
        });
        const result = await response.json();
        showComparison(result, lat, lon, placeName);
      } catch (err) {
        document.getElementById("comparison-results").innerHTML = `<div class="text-red-500 text-xs">ERROR: BACKEND UNREACHABLE</div>`;
      }
    });

    function showComparison(data, lat, lon, placeName) {
      const container = document.getElementById("comparison-results");
      container.innerHTML = `
        <div class="mb-4">
            <h3 class="text-white font-bold text-sm uppercase mb-1">${placeName}</h3>
            <p class="text-[10px] text-gray-500 font-mono">LAT: ${lat} / LON: ${lon}</p>
        </div>
        <table>
          <thead>
            <tr><th>Sensor</th><th>Index Status</th></tr>
          </thead>
          <tbody>
            ${Object.entries(data).map(([sat, values]) =>
                `<tr>
                  <td>${sat}</td>
                  <td style="color:${getColor(values.ndvi)}">${getNDVILabel(values.ndvi)}</td>
                </tr>`
            ).join("")}
          </tbody>
        </table>
      `;
    }
  </script>
</body>
</html>
