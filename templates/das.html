<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>SatFusion Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<style>/* ---------- DASHBOARD BASE ---------- */
body {
  background: radial-gradient(circle at top, #0b1a2d, #02030a);
  color: #ffffff;
  font-family: "Segoe UI", sans-serif;
}

/* Header */
header {
  text-align: center;
  padding: 25px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

header h1 {
  font-size: 2.2rem;
  letter-spacing: 1px;
  background: linear-gradient(90deg, #00d2ff, #3a7bd5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  opacity: 0.8;
  margin-top: 6px;
}

/* ---------- GRID LAYOUT ---------- */
.grid {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 25px;
  padding: 25px;
}

/* ---------- CONTROL PANEL ---------- */
.controls {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* ---------- CARD STYLE ---------- */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 0 35px rgba(0,0,0,0.5);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 15px 40px rgba(0,210,255,0.3);
}

.card h3 {
  margin-bottom: 12px;
  font-size: 1.1rem;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  padding-bottom: 6px;
}

/* ---------- FORM ELEMENTS ---------- */
label {
  display: block;
  margin: 8px 0;
  font-size: 0.95rem;
  opacity: 0.9;
}

input[type="checkbox"] {
  margin-right: 6px;
}

select {
  width: 100%;
  margin: 10px 0;
  padding: 8px;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* ---------- BUTTONS ---------- */
button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #00d2ff, #3a7bd5);
  color: white;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,210,255,0.5);
}

/* ---------- ANALYTICS OUTPUT ---------- */
#analytics-output {
  margin-top: 10px;
  background: rgba(0,0,0,0.4);
  border-radius: 8px;
  padding: 10px;
  font-size: 0.85rem;
  max-height: 120px;
  overflow-y: auto;
}

/* ---------- MAP PANEL ---------- */
.map-panel {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 15px;
  box-shadow: 0 0 35px rgba(0,0,0,0.6);
}

#map {
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.15);
}

.map-panel button {
  margin-top: 15px;
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
<body>
  <header>
    <h1>Dashboard</h1>
    <p>Welcome to your fused analysis workspace.</p>
  </header>
  <main class="grid">
    <section class="controls">
      <h2>Pipeline</h2>
      <div class="card">
        <h3>Ingest</h3>
        <label><input type="checkbox" id="src-sentinel" checked> Sentinel</label>
        <label><input type="checkbox" id="src-landsat" checked> Landsat</label>
        <label><input type="checkbox" id="src-isro" checked> ISRO</label>
        <button id="btn-ingest">Ingest</button>
      </div>
<div class="card">
        <h3>Preprocess</h3>
        <label><input type="checkbox" id="opt-cloud" checked> Cloud mask</label>
        <label><input type="checkbox" id="opt-atmo" checked> Atmospheric correction</label>
        <select id="opt-res">
          <option value="10m" selected>10m</option>
          <option value="30m">30m</option>
        </select>
        <button id="btn-preprocess">Preprocess</button>
      </div>
      <div class="card">
        <h3>Fusion</h3>
        <select id="fusion-mode">
          <option value="pixel">Pixel-level</option>
          <option value="feature" selected>Feature-level</option>
          <option value="decision">Decision-level</option>
        </select>
        <button id="btn-fuse">Fuse</button>
      </div>
      <div class="card">
        <h3>Analytics</h3>
        <label><input type="checkbox" id="task-land" checked> Land cover</label>
        <label><input type="checkbox" id="task-change" checked> Change detection</label>
        <label><input type="checkbox" id="task-yield" checked> Yield prediction</label>
        <button id="btn-analytics">Run</button>
        <pre id="analytics-output"></pre>
      </div>
    </section>

    <section class="map-panel">
      <div id="map" style="height: 500px;"></div>
      <button id="btn-load-layer">Load fused layer</button>
    </section>
  </main>

 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
