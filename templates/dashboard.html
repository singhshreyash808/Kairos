<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KAIROS | Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-style { background: #0f172a; border: 1px solid #1e293b; border-radius: 1rem; padding: 1rem; width: 100%; outline: none; transition: 0.3s; color: white; }
        .input-style:focus { border-color: #0ea5e9; box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); }
        .btn-active { border-color: #0ea5e9; background: rgba(14, 165, 233, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="glass p-10 rounded-[3rem] space-y-8">
            <div>
                <h1 class="text-5xl font-black italic tracking-tighter uppercase">Kairos<span class="text-sky-500">.</span></h1>
                <p id="status" class="text-[10px] text-sky-400 font-mono tracking-widest mt-2 uppercase">System Ready</p>
            </div>

            <div class="space-y-4">
                <input type="text" id="search" placeholder="Search City (e.g. Ghaziabad)" class="input-style" onkeyup="if(event.key==='Enter') searchLoc()">
                <div class="flex gap-2">
                    <input type="text" id="lat" value="28.61" class="input-style text-xs py-2">
                    <input type="text" id="lon" value="77.20" class="input-style text-xs py-2">
                </div>
            </div>
        </div>

        <div class="glass p-10 rounded-[3rem] flex flex-col justify-between">
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Primary Analysis Mode</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setMode('NDVI', this)" class="mode-btn glass p-4 rounded-2xl text-[10px] font-bold btn-active border-2 border-transparent">VEGETATION</button>
                    <button onclick="setMode('WATER', this)" class="mode-btn glass p-4 rounded-2xl text-[10px] font-bold border-2 border-transparent">HYDROLOGY</button>
                    <button onclick="setMode('NDBI', this)" class="mode-btn glass p-4 rounded-2xl text-[10px] font-bold border-2 border-transparent">URBAN</button>
                    <button onclick="setMode('EVI', this)" class="mode-btn glass p-4 rounded-2xl text-[10px] font-bold border-2 border-transparent">DENSE FOREST</button>
                </div>
            </div>

            <button onclick="launch()" class="w-full bg-sky-600 hover:bg-sky-500 py-5 rounded-2xl font-black uppercase text-xs tracking-widest transition shadow-lg shadow-sky-900/40 mt-8">
                Initialize Fusion Map
            </button>
        </div>
    </div>

    <script>
        let mode = 'NDVI';
        async function searchLoc() {
            const query = document.getElementById('search').value;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
            const data = await res.json();
            if(data[0]) {
                document.getElementById('lat').value = parseFloat(data[0].lat).toFixed(4);
                document.getElementById('lon').value = parseFloat(data[0].lon).toFixed(4);
                document.getElementById('status').innerText = `Locked: ${query.toUpperCase()}`;
            }
        }
        function setMode(m, btn) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('btn-active', 'border-sky-500'));
            btn.classList.add('btn-active', 'border-sky-500');
        }
       function launch() {
    // Store coordinates for the next page
    localStorage.setItem("k_lat", document.getElementById('lat').value);
    localStorage.setItem("k_lon", document.getElementById('lon').value);
    localStorage.setItem("k_mode", mode);
    
    // REDIRECT TO THE FLASK ROUTE
    window.location.href = '/map';
}
    </script>
</body>
</html>
