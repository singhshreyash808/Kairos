<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Terra Intelligence | Ultimate Command</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&family=JetBrains+Mono&display=swap');
        body { background-color: #000; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        #cesiumContainer { position: absolute; top: 0; right: 0; width: 75%; height: 100%; z-index: 1; }
        .glass-panel-left { background: linear-gradient(to right, #000 65%, transparent); z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .cesium-viewer-bottom { display: none !important; }
        .glass-blur { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Time Slider Customization */
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 10px; height: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: #06b6d4; cursor: pointer; box-shadow: 0 0 10px #06b6d4; }
    </style>
</head>
<body class="text-white">

    <nav class="absolute top-0 left-0 w-full h-16 glass-blur z-50 flex items-center justify-between px-10 border-b border-white/10">
        <div class="flex items-center gap-8">
            <div class="text-cyan-500 font-black tracking-tighter text-xl italic">TERRA_INTEL</div>
            <div class="relative interactive">
                <input type="text" id="searchInput" 
                    placeholder="ENTER COUNTRY..." 
                    class="bg-black/50 border border-white/20 rounded-full px-5 py-2 text-[10px] w-80 font-mono tracking-widest focus:border-cyan-500 outline-none transition-all"
                    onkeypress="if(event.key === 'Enter') performSearch()">
            </div>
        </div>
        
        <div class="flex items-center gap-4 interactive">
            <span class="text-[9px] font-mono text-gray-400 tracking-widest uppercase">Solar Cycle</span>
            <input type="range" id="timeSlider" min="0" max="24" step="0.1" value="12" class="w-48" oninput="updateTime(this.value)">
        </div>

        <div class="flex items-center gap-6 text-[10px] font-bold tracking-widest">
            <button class="text-gray-400 hover:text-white uppercase transition">Login</button>
            <button class="text-cyan-500 border border-cyan-500/30 px-4 py-2 rounded uppercase">Join</button>
        </div>
    </nav>

    <div class="absolute inset-y-0 left-0 w-1/2 glass-panel-left flex flex-col justify-center px-20 text-left items-start">
        <div class="interactive max-w-lg mt-10">
            <h4 id="telemetry-status" class="text-cyan-500 font-mono tracking-[0.5em] text-[10px] uppercase mb-2">Sync: Orbital/Atmospheric</h4>
            <h1 id="region-name" class="text-8xl font-black mb-6 uppercase leading-none">Earth</h1>
            
            <div id="drill-down-box" class="hidden mb-8 p-4 border border-cyan-500/30 bg-cyan-500/5 rounded-lg w-full">
                <p class="text-[10px] text-cyan-500 font-mono mb-2 uppercase tracking-widest">Identify Sub-Sector:</p>
                <div class="flex gap-2">
                    <input type="text" id="subInput" placeholder="CITY NAME..." class="bg-black border border-white/20 rounded px-3 py-2 text-[10px] w-full font-mono outline-none">
                    <button onclick="performSubSearch()" class="bg-cyan-600 px-4 py-2 text-[10px] font-bold hover:bg-cyan-500 transition">SCAN</button>
                </div>
            </div>

            <div id="data-display" class="hidden grid grid-cols-2 gap-4 mb-8 w-full">
                <div class="p-3 bg-white/5 border border-white/10 rounded">
                    <span class="block text-[9px] text-gray-500 uppercase tracking-widest mb-1">Visibility</span>
                    <span id="data-vis" class="text-xl font-bold font-mono text-cyan-400 uppercase">High</span>
                </div>
                <div class="p-3 bg-white/5 border border-white/10 rounded">
                    <span class="block text-[9px] text-gray-500 uppercase tracking-widest mb-1">Solar Intensity</span>
                    <span id="solar-val" class="text-xl font-bold font-mono uppercase">100%</span>
                </div>
            </div>

            <p id="region-info" class="text-gray-400 text-sm leading-relaxed italic border-l-2 border-cyan-500 pl-6">
                Full-spectrum lighting enabled. Use the Solar Cycle slider to simulate night-time luminosity and urban light patterns.
            </p>
        </div>
    </div>

    <div id="cesiumContainer"></div>

    <footer class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[95%] z-50">
        <div class="glass-blur rounded-2xl p-6 flex items-center justify-between border border-white/5 shadow-2xl">
            <div class="flex gap-4">
                <button onclick="viewer.scene.morphTo2D(1.0)" class="text-[9px] font-bold border border-white/10 bg-white/5 px-4 py-2 hover:bg-cyan-500/20 transition">VIEW 2D</button>
                <button onclick="viewer.scene.morphTo3D(1.0)" class="text-[9px] font-bold border border-white/10 bg-white/5 px-4 py-2 hover:bg-cyan-500/20 transition">VIEW 3D</button>
            </div>
            <div class="flex gap-4">
                <button onclick="toggleClouds()" id="cloudBtn" class="text-[9px] font-bold border border-cyan-500/50 bg-cyan-500/10 px-6 py-2 hover:bg-cyan-500/20 transition uppercase">Clouds On/Off</button>
                <button onclick="resetCamera()" class="text-[9px] font-bold border border-white/10 bg-white/5 px-6 py-2 hover:bg-orange-500/20 transition uppercase">Home Vector</button>
            </div>
        </div>
    </footer>

    <script>
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIyMjVlMGNjZC1jNjE3LTQ2YTAtYmZjOC02NWY5MmJkODNkZjMiLCJpZCI6Mzc5MTI4LCJpYXQiOjE3Njg0ODUyMzh9.AAa1UiByA-EBfTIdBoUCvu8LTqcaEgY3FeeIffHR44E';
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            baseLayerPicker: false, geocoder: false, animation: false, timeline: false, infoBox: false,
            shouldAnimate: true
        });

        // Enable Lighting for Day/Night effects
        viewer.scene.globe.enableLighting = true;

        // Add Cloud Layer
        const cloudLayer = viewer.imageryLayers.addImageryProvider(new Cesium.IonImageryProvider({ assetId: 3812 }));
        cloudLayer.alpha = 0.6;

        function toggleClouds() {
            cloudLayer.show = !cloudLayer.show;
            document.getElementById('cloudBtn').classList.toggle('bg-cyan-500/10');
        }

        function updateTime(value) {
            const date = new Date();
            date.setUTCHours(value);
            viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);
            document.getElementById('solar-val').innerText = (value > 6 && value < 18) ? "DAY" : "NIGHT";
        }

        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&featuretype=country`);
                const data = await res.json();
                if (data[0]) {
                    document.getElementById('region-name').innerText = query;
                    document.getElementById('drill-down-box').classList.remove('hidden');
                    viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(parseFloat(data[0].lon), parseFloat(data[0].lat), 4000000) });
                }
            } catch (e) {}
        }

        async function performSubSearch() {
            const city = document.getElementById('subInput').value;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`);
                const data = await res.json();
                if (data[0]) {
                    document.getElementById('data-display').classList.remove('hidden');
                    viewer.camera.flyTo({ 
                        destination: Cesium.Cartesian3.fromDegrees(parseFloat(data[0].lon), parseFloat(data[0].lat), 20000),
                        orientation: { pitch: Cesium.Math.toRadians(-35) }
                    });
                }
            } catch (e) {}
        }

        function resetCamera() {
            viewer.camera.flyHome(2.0);
            document.getElementById('region-name').innerText = "EARTH";
            document.getElementById('drill-down-box').classList.add('hidden');
        }
    </script>
</body>
</html>
