<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>KAIROS | Core Command</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        #cesiumContainer { position: absolute; top: 0; right: 0; width: 75%; height: 100%; z-index: 1; }
        .glass-panel-left { background: linear-gradient(to right, #000 60%, transparent); z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .cesium-viewer-bottom { display: none !important; }
        .glass-blur { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>

<body class="text-white">

    <nav class="absolute top-0 left-0 w-full h-16 glass-blur z-50 flex items-center justify-between px-10 border-b border-white/10">
        <div class="flex items-center gap-8">
            <div class="text-cyan-500 font-bold tracking-tighter text-xl italic">KAIROS</div>
            <div class="hidden md:flex gap-6 text-[10px] font-bold tracking-[0.2em] text-gray-500">
                 <a href="#" class="hover:text-white transition uppercase tracking-widest">About</a>
                 <a href="/dashboard" class="hover:text-white transition uppercase tracking-widest">Dashboard</a>
                <!-- <a href="#" class="hover:text-white transition uppercase tracking-widest">Database</a> -->
            </div> 
        </div>
        <div class="flex items-center gap-6">
            <button class="text-[10px] font-bold tracking-widest text-gray-400 hover:text-white transition" onclick="window.location.href='/finallogin'">LOGIN</button>
            <div class="h-4 w-px bg-white/20"></div>
            <button class="text-[10px] font-bold tracking-widest text-cyan-500 hover:text-cyan-400 border border-cyan-500/30 px-4 py-1.5 rounded uppercase">Join</button>
        </div>
    </nav>

    <div class="absolute inset-y-0 left-0 w-1/2 glass-panel-left flex flex-col justify-center px-20 text-left items-start">
        <div class="interactive max-w-lg mt-10">
            <h4 class="text-cyan-500 font-mono tracking-[0.5em] text-[10px] uppercase mb-2"></h4>
            <h1 id="region-name" class="text-8xl font-light tracking-tighter mb-6 transition-all duration-1000 uppercase">KAIROS</h1>
            <p id="region-info" class="text-gray-400 text-sm leading-relaxed mb-12 italic">
                Unified MultiSatellite Analysis & Visualization Platform.
            </p>
        </div>
    </div>

    <div id="cesiumContainer"></div>

    <footer class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[95%] z-50">
        <div class="glass-blur rounded-xl p-5 flex items-center gap-10 border border-white/5 shadow-2xl">
            
            <div class="flex flex-col border-r border-white/10 pr-10">
                <span class="text-[9px] text-cyan-500 font-black tracking-[0.3em] uppercase mb-1 underline">Action</span>
                <span class="text-lg font-black tracking-tighter uppercase">Begin Analysis</span>
            </div>

            <div class="flex flex-col border-r border-white/10 pr-10">
                <span class="text-[9px] text-gray-500 font-bold tracking-widest uppercase mb-3 italic">2D/3D Visualization</span>
                <div class="flex gap-2">
                    <button class="text-[9px] font-bold border border-white/10 bg-white/5 px-4 py-2 hover:bg-cyan-500/20 transition uppercase" onclick="window.location.href='/map'">Earthcore 2D</button>
                    <button class="text-[9px] font-bold border border-white/10 bg-white/5 px-4 py-2 hover:bg-cyan-500/20 transition uppercase" onclick="window.location.href='/earth3d'">Earthcore 3D</button>
                </div>
            </div>

            <div class="flex flex-col">
                <span class="text-[9px] text-gray-500 font-bold tracking-widest uppercase mb-3 italic">Advanced Processing</span>
                <div class="flex gap-2">
                    <button class="text-[9px] font-bold border border-white/10 bg-white/5 px-4 py-2 hover:bg-orange-500/20 transition uppercase" onclick="window.location.href='/datasetview'">Dataset View</button>
                    <button class="text-[9px] font-bold border border-white/10 bg-white/5 px-4 py-2 hover:bg-orange-500/20 transition uppercase" onclick="window.location.href='/imageanalysis'">Image Analysis</button>
                    <button class="text-[9px] font-bold border border-white/10 bg-white/5 px-4 py-2 hover:bg-orange-500/20 transition uppercase" onclick="window.location.href='/dataview'">Dataview</button>
                </div>
            </div>

        </div>
    </footer>

    <script>
        // Use your Ion Token
         Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIyMjVlMGNjZC1jNjE3LTQ2YTAtYmZjOC02NWY5MmJkODNkZjMiLCJpZCI6Mzc5MTI4LCJpYXQiOjE3Njg0ODUyMzh9.AAa1UiByA-EBfTIdBoUCvu8LTqcaEgY3FeeIffHR44E';
       

        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            backgroundColor: Cesium.Color.BLACK,
            baseLayerPicker: false, 
            geocoder: false, 
            animation: false, 
            timeline: false, 
            infoBox: false,
            selectionIndicator: false, 
            navigationHelpButton: false
        });

        // Continuous cinematic rotation
        viewer.scene.postRender.addEventListener(() => {
            viewer.scene.camera.rotate(Cesium.Cartesian3.UNIT_Z, 0.0003);
        });

       
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase configuration (reusing from finallogin.html)
        const firebaseConfig = {
            apiKey: "AIzaSyCXOKzOkQHGh1yJ8BDrIwibm8HZK8i91vY",
            authDomain: "satfussion.firebaseapp.com",
            projectId: "satfussion",
            storageBucket: "satfussion.firebasestorage.app",
            messagingSenderId: "419400121975",
            appId: "1:419400121975:web:66226e2257cbd8f0acd072"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // Google Login
        window.loginWithGoogle = () => {
            signInWithPopup(auth, googleProvider)
                .then(() => { window.location.href = '/dashboard'; })
                .catch((err) => alert("Google Login Error: " + err.message));
        };

        // Email Login
        window.loginWithEmail = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => { window.location.href = '/dashboard'; })
                .catch((err) => alert("Email Login Error: " + err.message));
        };
    </script>
</body>
</html>
